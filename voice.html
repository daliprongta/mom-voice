<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voice Input — MOM Recorder</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:system-ui,-apple-system,sans-serif;
    background:#0f172a;color:#f8fafc;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;padding:28px;
    user-select:none;
  }
  .lbl{font-size:10px;font-weight:700;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .field{font-size:16px;font-weight:600;color:#e2e8f0;margin-bottom:32px;text-align:center;max-width:300px;line-height:1.4;min-height:24px;}
  .ring-wrap{position:relative;margin-bottom:22px;}
  .ring{position:absolute;inset:-16px;border-radius:50%;border:2px solid rgba(99,102,241,.35);pointer-events:none;}
  .ring.on{animation:ring 1.1s ease-in-out infinite;}
  @keyframes ring{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.22);opacity:.85}}
  .mic{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#818cf8);
    display:flex;align-items:center;justify-content:center;
    position:relative;z-index:1;
    box-shadow:0 4px 28px rgba(99,102,241,.45);
    transition:transform .15s,box-shadow .15s;}
  .mic:hover{transform:scale(1.06);}
  .mic.on{background:linear-gradient(135deg,#dc2626,#f87171);box-shadow:0 4px 28px rgba(220,38,38,.45);}
  .st{font-size:13px;color:#64748b;min-height:20px;text-align:center;margin-bottom:18px;transition:color .2s;}
  .st.on{color:#fca5a5;font-weight:500;}
  .tbox{width:300px;background:#1e293b;border:1px solid #334155;border-radius:12px;
    padding:13px 15px;margin-bottom:15px;display:none;}
  .tlbl{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
  #tt{font-size:14px;color:#f1f5f9;line-height:1.5;word-break:break-word;min-height:20px;}
  #tt.dim{color:#64748b;font-style:italic;}
  .btns{display:none;gap:9px;width:300px;margin-bottom:4px;}
  .abtn{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .retry{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
  .retry:hover{background:#334155;color:#f1f5f9;}
  .use{background:#16a34a;color:#fff;}
  .use:hover{background:#15803d;}
  .use:disabled{background:#1e293b;color:#4b5563;cursor:not-allowed;border:1px solid #334155;}
  .tip{font-size:11px;color:#334155;text-align:center;margin-top:14px;max-width:280px;line-height:1.7;}
  .err{background:#450a0a;border:1px solid #7f1d1d;border-radius:10px;padding:14px 16px;
    width:300px;text-align:center;font-size:12px;color:#fca5a5;line-height:1.7;
    display:none;margin-top:10px;}
  .close-row{position:fixed;top:14px;right:16px;}
  .close-x{background:none;border:none;color:#475569;font-size:22px;cursor:pointer;line-height:1;padding:4px 8px;}
  .close-x:hover{color:#94a3b8;}
</style>
</head>
<body>

<div class="close-row">
  <button class="close-x" onclick="cancel()" title="Close">✕</button>
</div>

<div class="lbl">Voice Input</div>
<div class="field" id="fld">Loading…</div>

<div class="ring-wrap">
  <div class="ring" id="ring"></div>
  <button class="mic" id="mic" onclick="toggle()">
    <svg id="mico" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" width="32" height="32">
      <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
      <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
    </svg>
    <svg id="sico" viewBox="0 0 24 24" fill="#fff" width="26" height="26" style="display:none">
      <rect x="6" y="6" width="12" height="12" rx="2"/>
    </svg>
  </button>
</div>

<div class="st" id="st"></div>

<div class="tbox" id="tbox">
  <div class="tlbl">Heard</div>
  <div id="tt"></div>
</div>

<div class="btns" id="btns">
  <button class="abtn retry" onclick="retry()">↺ Retry</button>
  <button class="abtn use" id="use" onclick="send()" disabled>✓ Use this</button>
</div>

<p class="tip">Click the mic to start · speak clearly · click again to stop · then click <strong>Use this</strong></p>
<div class="err" id="err"></div>

<script>
// ── Read params from URL ──
function param(name) {
  var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
  return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : '';
}

var fieldLabel = param('field') || 'text field';
var cbId       = param('cbId')  || '';
var origin     = param('origin')|| '*';   // the GAS app origin for postMessage targeting

document.getElementById('fld').textContent = 'Speaking into: ' + fieldLabel;

// ── Speech Recognition ──
var rec    = null;
var final_ = '';

if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
  showErr('Speech recognition requires Google Chrome (desktop).');
} else {
  setTimeout(go, 400);
}

function go() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang           = 'en-IN';
  rec.interimResults = true;
  rec.continuous     = false;

  setUI(true);
  final_ = '';
  hide('tbox'); hideFlex('btns');

  rec.onresult = function(e) {
    var it = '', ft = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) ft += e.results[i][0].transcript;
      else it += e.results[i][0].transcript;
    }
    if (ft) final_ += ft;
    var tt = document.getElementById('tt');
    tt.textContent = final_ + it;
    tt.className   = (it && !final_) ? 'dim' : '';
    show('tbox');
  };

  rec.onend = function() {
    setUI(false);
    if (final_.trim()) {
      showFlex('btns');
      document.getElementById('use').disabled = false;
      document.getElementById('tt').className = '';
      document.getElementById('tt').textContent = final_;
    } else {
      document.getElementById('st').textContent = 'No speech detected — try again.';
    }
  };

  rec.onerror = function(ev) {
    setUI(false);
    if (ev.error === 'not-allowed') {
      showErr(
        'Microphone access denied.<br><br>' +
        'To fix:<br>' +
        '1. Click the 🔒 icon in <strong>this window\'s</strong> address bar<br>' +
        '2. Set Microphone → <strong>Allow</strong><br>' +
        '3. Click <strong>Retry</strong> below'
      );
      showFlex('btns');
      document.getElementById('use').disabled = true;
    } else if (ev.error === 'no-speech') {
      document.getElementById('st').textContent = 'No speech heard — try again.';
    } else {
      document.getElementById('st').textContent = 'Error: ' + ev.error + ' — try again.';
    }
  };

  try {
    rec.start();
  } catch(ex) {
    setUI(false);
    document.getElementById('st').textContent = 'Cannot start: ' + ex.message;
  }
}

function stop() { if (rec) { try{ rec.stop(); } catch(e){} } }
function toggle() {
  if (document.getElementById('mic').classList.contains('on')) stop();
  else go();
}
function retry() {
  final_ = '';
  document.getElementById('tt').textContent = '';
  document.getElementById('err').style.display = 'none';
  hideFlex('btns');
  document.getElementById('use').disabled = true;
  go();
}
function send() {
  var t = final_.trim();
  if (!t) return;
  // Send to opener (the GAS app)
  var target = origin !== '*' ? origin : '*';
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'VOICE_RESULT', text: t, cbId: cbId }, target);
  }
  window.close();
}
function cancel() {
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'VOICE_CLOSE' }, '*');
  }
  window.close();
}
function setUI(on) {
  var m  = document.getElementById('mic');
  var r  = document.getElementById('ring');
  var st = document.getElementById('st');
  var mi = document.getElementById('mico');
  var si = document.getElementById('sico');
  if (on) {
    m.classList.add('on'); r.classList.add('on');
    st.textContent = '● Listening… (click mic to stop)';
    st.className = 'st on';
    mi.style.display = 'none'; si.style.display = '';
  } else {
    m.classList.remove('on'); r.classList.remove('on');
    st.textContent = ''; st.className = 'st';
    mi.style.display = ''; si.style.display = 'none';
  }
}
function show(id)     { document.getElementById(id).style.display = 'block'; }
function hide(id)     { document.getElementById(id).style.display = 'none'; }
function showFlex(id) { document.getElementById(id).style.display = 'flex'; }
function hideFlex(id) { document.getElementById(id).style.display = 'none'; }
function showErr(html){ var e = document.getElementById('err'); e.style.display='block'; e.innerHTML=html; }
</script>
</body>
</html>
